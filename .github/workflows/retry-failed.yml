name: Retry Failed Platforms

on:
  schedule:
    # Run 24 hours after the main monitor (offset by 1 hour to avoid collision)
    - cron: '0 1 * * *'   # 09:00 Beijing
    - cron: '0 13 * * *'  # 21:00 Beijing
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  actions: write

jobs:
  check-and-retry:
    name: Retry if still failing
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Validate required secrets
        id: secrets
        run: |
          if [ -z "${{ secrets.SELECTORS_REPO_PAT }}" ]; then
            echo "ready=false" >> $GITHUB_OUTPUT
          else
            echo "ready=true" >> $GITHUB_OUTPUT
          fi

      - name: Check for open auto-fix PRs
        id: check_prs
        if: steps.secrets.outputs.ready == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SELECTORS_REPO_PAT }}
          script: |
            const { data: prs } = await github.rest.pulls.list({
              owner: 'RainTreeQ',
              repo: 'sendol-selectors',
              state: 'open',
              sort: 'created',
              direction: 'desc',
              per_page: 100,
            });
            const hasOpenPR = prs.some((pr) => pr.title.includes('Auto-fix'));
            core.setOutput('has_open_pr', hasOpenPR.toString());
            console.log(`Open auto-fix PRs: ${prs.length}`);

      - name: Re-run tests
        id: retest
        if: steps.secrets.outputs.ready == 'true' && steps.check_prs.outputs.has_open_pr == 'false'
        continue-on-error: true
        run: |
          node scripts/test-input-support.mjs || true
          if [ -f test-results.json ]; then
            FAILED=$(node -e "const r = require('./test-results.json'); console.log(r.failedPlatforms.join(','));")
            HAS_FAILURES=$(node -e "const r = require('./test-results.json'); console.log(r.failed > 0 ? 'true' : 'false');")
            echo "failed_platforms=$FAILED" >> $GITHUB_OUTPUT
            echo "has_failures=$HAS_FAILURES" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Circuit breaker check
        id: breaker
        if: |
          steps.secrets.outputs.ready == 'true' &&
          steps.check_prs.outputs.has_open_pr == 'false' &&
          steps.retest.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        env:
          FAILED_PLATFORMS: ${{ steps.retest.outputs.failed_platforms }}
        with:
          github-token: ${{ secrets.SELECTORS_REPO_PAT }}
          script: |
            const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
            const threshold = 3;
            const platforms = process.env.FAILED_PLATFORMS.split(',').map((p) => p.trim()).filter(Boolean);

            const { data: pulls } = await github.rest.pulls.list({
              owner: 'RainTreeQ',
              repo: 'sendol-selectors',
              state: 'all',
              sort: 'created',
              direction: 'desc',
              per_page: 100,
            });

            const blocked = platforms.some((platform) => {
              const count = pulls.filter((pr) => {
                if (!pr.title.includes('Auto-fix')) return false;
                if (!pr.title.includes(platform)) return false;
                return new Date(pr.created_at).getTime() >= sevenDaysAgo;
              }).length;
              return count >= threshold;
            });

            core.setOutput('should_trigger', blocked ? 'false' : 'true');

      - name: Trigger auto-fix workflow
        if: |
          steps.secrets.outputs.ready == 'true' &&
          steps.check_prs.outputs.has_open_pr == 'false' &&
          steps.retest.outputs.has_failures == 'true' &&
          steps.breaker.outputs.should_trigger == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.SELECTORS_REPO_PAT }}
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-fix-selectors.yml',
              ref: 'master',
              inputs: {
                failed_platforms: '${{ steps.retest.outputs.failed_platforms }}'
              }
            });
            console.log('Triggered auto-fix for persistent failures');

      - name: Report missing token
        if: steps.secrets.outputs.ready != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: 'Retry workflow skipped: missing SELECTORS_REPO_PAT',
              body: 'Set `SELECTORS_REPO_PAT` in repository secrets to enable retry + auto-fix flow.',
              labels: ['auto-fix', 'needs-review'],
            });
