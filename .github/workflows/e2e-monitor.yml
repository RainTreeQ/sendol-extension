name: E2E Monitor (Daily)

on:
  schedule:
    - cron: '0 0 * * *'   # 08:00 Beijing (00:00 UTC)
    - cron: '0 12 * * *'  # 20:00 Beijing (12:00 UTC)
  workflow_dispatch:       # Manual trigger

jobs:
  test:
    name: Test All Platforms
    runs-on: ubuntu-latest
    outputs:
      failed_platforms: ${{ steps.test.outputs.failed_platforms }}
      has_failures: ${{ steps.test.outputs.has_failures }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        id: test
        continue-on-error: true
        run: |
          node scripts/test-input-support.mjs || true
          # Read results
          if [ -f test-results.json ]; then
            FAILED=$(node -e "const r = require('./test-results.json'); console.log(r.failedPlatforms.join(','));")
            HAS_FAILURES=$(node -e "const r = require('./test-results.json'); console.log(r.failed > 0 ? 'true' : 'false');")
            echo "failed_platforms=$FAILED" >> $GITHUB_OUTPUT
            echo "has_failures=$HAS_FAILURES" >> $GITHUB_OUTPUT
          else
            echo "has_failures=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.json
          retention-days: 7

      - name: Trigger auto-fix
        if: steps.test.outputs.has_failures == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'auto-fix-selectors.yml',
              ref: 'main',
              inputs: {
                failed_platforms: '${{ steps.test.outputs.failed_platforms }}'
              }
            });

      - name: Email notification on failure
        if: steps.test.outputs.has_failures == 'true'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{secrets.MAIL_USERNAME}}
          password: ${{secrets.MAIL_PASSWORD}}
          subject: "[Sendol] Auto-fix triggered for ${{ steps.test.outputs.failed_platforms }}"
          to: ${{secrets.NOTIFY_EMAIL}}
          from: Sendol Monitor
          body: |
            E2E tests detected failures on the following platforms:
            ${{ steps.test.outputs.failed_platforms }}

            Auto-fix workflow has been triggered.
            A Pull Request will be created shortly with suggested fixes.

            Check the PR: ${{github.server_url}}/${{github.repository}}/pulls

            If the PR looks good, simply click "Merge pull request".
